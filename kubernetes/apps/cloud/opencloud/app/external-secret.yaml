---
# Single Password Generator for all secrets (12 keys)
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: opencloud-secrets
spec:
  length: 32
  noUpper: false
  allowRepeat: true
  secretKeys:
    - jwtSecret
    - machineAuthApiKey
    - transferSecret
    - serviceAccountSecret
    - idmServicePassword
    - idmRevaServicePassword
    - idmIdpServicePassword
    - collaborationWopiSecret
    - systemUserApiKey
    - urlSigningSecret
    - thumbnailsTransferSecret
    - idmAdminPassword
---
# Single UUID Generator for all UUIDs (5 keys)
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: opencloud-uuids
spec:
  secretKeys:
    - systemUserID
    - adminUserID
    - serviceAccountID
    - graphApplicationID
    - storageUsersMountID
---
# ExternalSecret that references both generators
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opencloud-init
spec:
  refreshInterval: 1h
  target:
    name: opencloud-init-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: opencloud-secrets
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: opencloud-uuids
