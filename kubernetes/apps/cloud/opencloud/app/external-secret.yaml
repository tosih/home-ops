---
# Single Password Generator for all secrets (12 keys)
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: opencloud-secrets
spec:
  length: 32
  noUpper: false
  allowRepeat: true
  special: false
  secretKeys:
    - jwtSecret
    - machineAuthApiKey
    - transferSecret
    - serviceAccountSecret
    - idmServicePassword
    - idmRevaServicePassword
    - idmIdpServicePassword
    - collaborationWopiSecret
    - systemUserApiKey
    - urlSigningSecret
    - thumbnailsTransferSecret
    - idmAdminPassword
---
# UUID Generators (UUID doesn't support secretKeys, need separate generators)
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: system-user-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: admin-user-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: service-account-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: graph-application-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: storage-users-mount-id
spec: {}
---
# ExternalSecret that references all generators
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opencloud-init
spec:
  refreshPolicy: CreatedOnce
  target:
    name: opencloud-init-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Passwords from opencloud-secrets generator
        jwtSecret: "{{ .jwtSecret }}"
        machineAuthApiKey: "{{ .machineAuthApiKey }}"
        transferSecret: "{{ .transferSecret }}"
        serviceAccountSecret: "{{ .serviceAccountSecret }}"
        idmServicePassword: "{{ .idmServicePassword }}"
        idmRevaServicePassword: "{{ .idmRevaServicePassword }}"
        idmIdpServicePassword: "{{ .idmIdpServicePassword }}"
        collaborationWopiSecret: "{{ .collaborationWopiSecret }}"
        systemUserApiKey: "{{ .systemUserApiKey }}"
        urlSigningSecret: "{{ .urlSigningSecret }}"
        thumbnailsTransferSecret: "{{ .thumbnailsTransferSecret }}"
        idmAdminPassword: "{{ .idmAdminPassword }}"
        # UUIDs from individual generators
        systemUserID: "{{ .systemUserID }}"
        adminUserID: "{{ .adminUserID }}"
        serviceAccountID: "{{ .serviceAccountID }}"
        graphApplicationID: "{{ .graphApplicationID }}"
        storageUsersMountID: "{{ .storageUsersMountID }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: opencloud-secrets
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: system-user-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "systemUserID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: admin-user-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "adminUserID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: service-account-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "serviceAccountID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: graph-application-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "graphApplicationID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: storage-users-mount-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "storageUsersMountID"
