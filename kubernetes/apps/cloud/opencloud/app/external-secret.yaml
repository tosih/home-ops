---
# Password Generators (12 random secrets)
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: jwt-secret
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: machine-auth-api-key
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: transfer-secret
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: service-account-secret
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: idm-service-password
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: idm-reva-service-password
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: idm-idp-service-password
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: collaboration-wopi-secret
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: system-user-api-key
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: url-signing-secret
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: thumbnails-transfer-secret
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: idm-admin-password
spec:
  length: 32
  noUpper: false
  allowRepeat: true
---
# UUID Generators (5 UUIDs)
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: system-user-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: admin-user-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: service-account-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: graph-application-id
spec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: UUID
metadata:
  name: storage-users-mount-id
spec: {}
---
# ExternalSecret that references all generators
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opencloud-init
spec:
  refreshInterval: 1h
  target:
    name: opencloud-init-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        jwtSecret: "{{ .jwtSecret }}"
        machineAuthApiKey: "{{ .machineAuthApiKey }}"
        transferSecret: "{{ .transferSecret }}"
        serviceAccountSecret: "{{ .serviceAccountSecret }}"
        idmServicePassword: "{{ .idmServicePassword }}"
        idmRevaServicePassword: "{{ .idmRevaServicePassword }}"
        idmIdpServicePassword: "{{ .idmIdpServicePassword }}"
        collaborationWopiSecret: "{{ .collaborationWopiSecret }}"
        systemUserApiKey: "{{ .systemUserApiKey }}"
        urlSigningSecret: "{{ .urlSigningSecret }}"
        thumbnailsTransferSecret: "{{ .thumbnailsTransferSecret }}"
        IDM_ADMIN_PASSWORD: "{{ .idmAdminPassword }}"
        systemUserID: "{{ .systemUserID }}"
        adminUserID: "{{ .adminUserID }}"
        serviceAccountID: "{{ .serviceAccountID }}"
        graphApplicationID: "{{ .graphApplicationID }}"
        storageUsersMountID: "{{ .storageUsersMountID }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: jwt-secret
      rewrite:
        - regexp:
            source: "password"
            target: "jwtSecret"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: machine-auth-api-key
      rewrite:
        - regexp:
            source: "password"
            target: "machineAuthApiKey"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: transfer-secret
      rewrite:
        - regexp:
            source: "password"
            target: "transferSecret"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: service-account-secret
      rewrite:
        - regexp:
            source: "password"
            target: "serviceAccountSecret"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: idm-service-password
      rewrite:
        - regexp:
            source: "password"
            target: "idmServicePassword"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: idm-reva-service-password
      rewrite:
        - regexp:
            source: "password"
            target: "idmRevaServicePassword"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: idm-idp-service-password
      rewrite:
        - regexp:
            source: "password"
            target: "idmIdpServicePassword"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: collaboration-wopi-secret
      rewrite:
        - regexp:
            source: "password"
            target: "collaborationWopiSecret"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: system-user-api-key
      rewrite:
        - regexp:
            source: "password"
            target: "systemUserApiKey"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: url-signing-secret
      rewrite:
        - regexp:
            source: "password"
            target: "urlSigningSecret"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: thumbnails-transfer-secret
      rewrite:
        - regexp:
            source: "password"
            target: "thumbnailsTransferSecret"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: idm-admin-password
      rewrite:
        - regexp:
            source: "password"
            target: "idmAdminPassword"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: system-user-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "systemUserID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: admin-user-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "adminUserID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: service-account-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "serviceAccountID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: graph-application-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "graphApplicationID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: UUID
          name: storage-users-mount-id
      rewrite:
        - regexp:
            source: "uuid"
            target: "storageUsersMountID"
