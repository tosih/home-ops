---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opencloud-init
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password-sdk
  target:
    name: opencloud-init-secret
    creationPolicy: Owner
  data:
    # Random secrets (11 keys)
    - secretKey: jwtSecret
      remoteRef:
        key: opencloud/jwt_secret
    - secretKey: machineAuthApiKey
      remoteRef:
        key: opencloud/machine_auth_api_key
    - secretKey: transferSecret
      remoteRef:
        key: opencloud/transfer_secret
    - secretKey: serviceAccountSecret
      remoteRef:
        key: opencloud/service_account_secret
    - secretKey: idmServicePassword
      remoteRef:
        key: opencloud/idm_service_password
    - secretKey: idmRevaServicePassword
      remoteRef:
        key: opencloud/idm_reva_service_password
    - secretKey: idmIdpServicePassword
      remoteRef:
        key: opencloud/idm_idp_service_password
    - secretKey: collaborationWopiSecret
      remoteRef:
        key: opencloud/collaboration_wopi_secret
    - secretKey: systemUserApiKey
      remoteRef:
        key: opencloud/system_user_api_key
    - secretKey: urlSigningSecret
      remoteRef:
        key: opencloud/url_signing_secret
    - secretKey: thumbnailsTransferSecret
      remoteRef:
        key: opencloud/thumbnails_transfer_secret
    # UUIDs (5 keys)
    - secretKey: systemUserID
      remoteRef:
        key: opencloud/system_user_id
    - secretKey: adminUserID
      remoteRef:
        key: opencloud/admin_user_id
    - secretKey: serviceAccountID
      remoteRef:
        key: opencloud/service_account_id
    - secretKey: graphApplicationID
      remoteRef:
        key: opencloud/graph_application_id
    - secretKey: storageUsersMountID
      remoteRef:
        key: opencloud/storage_users_mount_id
    # IDM Admin Password
    - secretKey: IDM_ADMIN_PASSWORD
      remoteRef:
        key: opencloud/idm_admin_password
