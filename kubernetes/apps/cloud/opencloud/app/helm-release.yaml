---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencloud
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      opencloud:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: opencloudeu/opencloud-rolling
              tag: "5.2.0"

            command:
              - opencloud
              - server

            env:
              TZ: America/Los_Angeles
              OC_URL: https://opencloud.tosih.org
              OC_LOG_LEVEL: info
              OC_LOG_PRETTY: "false"
              PROXY_TLS: "false"
              OC_INSECURE: "false"

              # OIDC Configuration for PocketID
              OC_OIDC_ISSUER: https://pid.tosih.org
              OC_EXCLUDE_RUN_SERVICES: idp
              PROXY_OIDC_REWRITE_WELLKNOWN: "true"
              PROXY_USER_OIDC_CLAIM: preferred_username
              PROXY_USER_CS3_CLAIM: username

              # Auto-provision users from PocketID
              PROXY_AUTOPROVISION_ACCOUNTS: "true"
              PROXY_AUTOPROVISION_CLAIM_USERNAME: preferred_username
              PROXY_AUTOPROVISION_CLAIM_DISPLAYNAME: name
              PROXY_AUTOPROVISION_CLAIM_EMAIL: email
              GRAPH_USERNAME_MATCH: none

              # Disable built-in IDP (using PocketID instead)
              IDM_CREATE_DEMO_USERS: "false"

              # CSP config to allow PocketID OIDC issuer
              PROXY_CSP_CONFIG_FILE_LOCATION: /etc/opencloud/csp.yaml

              # Runtime secrets from init-secret (skip opencloud init)
              OC_JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: jwtSecret
              OC_MACHINE_AUTH_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: machineAuthApiKey
              OC_TRANSFER_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: transferSecret
              OC_SYSTEM_USER_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: systemUserApiKey
              OC_URL_SIGNING_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: urlSigningSecret
              OC_SERVICE_ACCOUNT_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: serviceAccountID
              OC_SERVICE_ACCOUNT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: serviceAccountSecret
              SETTINGS_SERVICE_ACCOUNT_IDS:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: serviceAccountID
              IDM_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmAdminPassword
              IDM_SVC_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmServicePassword
              IDM_REVASVC_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmRevaServicePassword
              IDM_IDPSVC_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmIdpServicePassword
              USERS_LDAP_BIND_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmServicePassword
              GROUPS_LDAP_BIND_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmServicePassword
              AUTH_BASIC_LDAP_BIND_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmServicePassword
              IDP_LDAP_BIND_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmIdpServicePassword
              GRAPH_LDAP_BIND_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: idmServicePassword
              OC_SYSTEM_USER_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: systemUserID
              OC_ADMIN_USER_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: adminUserID
              GRAPH_APPLICATION_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: graphApplicationID
              STORAGE_USERS_MOUNT_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: storageUsersMountID
              GATEWAY_STORAGE_USERS_MOUNT_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: storageUsersMountID
              COLLABORATION_WOPI_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: collaborationWopiSecret
              THUMBNAILS_TRANSFER_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-init-secret
                    key: thumbnailsTransferSecret

            envFrom:
              - secretRef:
                  name: opencloud-secret

            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /healthz
                port: 9200
              readiness:
                enabled: true
                type: HTTP
                path: /healthz
                port: 9200

            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: opencloud
        type: ClusterIP
        ports:
          http:
            port: 9200

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: File sync and collaboration
          gethomepage.dev/group: Apps
          gethomepage.dev/icon: owncloud
          gethomepage.dev/name: OpenCloud
          gethomepage.dev/app: opencloud
        hostnames: ["opencloud.tosih.org"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 9200

    persistence:
      csp:
        type: configMap
        name: opencloud-csp
        globalMounts:
          - path: /etc/opencloud/csp.yaml
            subPath: csp.yaml
            readOnly: true
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 10Gi
        globalMounts:
          - path: /etc/opencloud
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 50Gi
        globalMounts:
          - path: /var/lib/opencloud
