---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencloud
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      opencloud:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        initContainers:
          init:
            image:
              repository: opencloudeu/opencloud
              tag: 4.0.3
            command:
              - /bin/sh
              - -c
            args:
              - |
                IDM_ADMIN_PASSWORD="" opencloud init --diff || opencloud init
            env:
              IDM_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-secret
                    key: IDM_ADMIN_PASSWORD
              OC_INSECURE: "true"

        containers:
          app:
            image:
              repository: opencloudeu/opencloud
              tag: 4.0.3

            command:
              - opencloud
              - server

            env:
              TZ: America/Los_Angeles
              OC_URL: https://opencloud.tosih.org
              OC_LOG_LEVEL: info
              OC_LOG_PRETTY: "false"
              PROXY_TLS: "false"
              OC_INSECURE: "false"

              # OIDC Configuration for PocketID
              WEB_OIDC_CLIENT_ID: opencloud
              PROXY_OIDC_ISSUER: https://pid.tosih.org
              PROXY_OIDC_REWRITE_WELLKNOWN: "true"
              PROXY_OIDC_ACCESS_TOKEN_VERIFY_METHOD: none
              PROXY_OIDC_SKIP_USER_INFO: "false"

              # Auto-provision users from PocketID
              PROXY_AUTOPROVISION_ACCOUNTS: "true"
              PROXY_AUTOPROVISION_CLAIM_USERNAME: preferred_username
              PROXY_AUTOPROVISION_CLAIM_DISPLAYNAME: name
              PROXY_AUTOPROVISION_CLAIM_EMAIL: email

              # Disable built-in IDP (using PocketID instead)
              IDM_CREATE_DEMO_USERS: "false"

            envFrom:
              - secretRef:
                  name: opencloud-secret

            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /healthz
                port: 9200
              readiness:
                enabled: true
                type: HTTP
                path: /healthz
                port: 9200

            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: opencloud
        type: ClusterIP
        ports:
          http:
            port: 9200

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: File sync and collaboration
          gethomepage.dev/group: Apps
          gethomepage.dev/icon: owncloud
          gethomepage.dev/name: OpenCloud
          gethomepage.dev/app: opencloud
        hostnames: ["opencloud.tosih.org"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 9200

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 10Gi
        globalMounts:
          - path: /etc/opencloud
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 50Gi
        globalMounts:
          - path: /var/lib/opencloud
