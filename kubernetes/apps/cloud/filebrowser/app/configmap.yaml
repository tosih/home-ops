---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebrowser-config
  namespace: cloud
data:
  config.yaml: |
    server:
      port: 80
      baseURL: "/"
      cacheDir: /home/filebrowser/data/tmp
      sources:
        - path: /srv
          config:
            defaultEnabled: true
    
    auth:
      methods:
        password:
          enabled: true
    
    userDefaults:
      darkMode: true
      permissions:
        admin: false
        modify: true
        share: true
        download: true
        create: true
        delete: true
