---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      filebrowser:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: gtstef/filebrowser
              tag: "stable"

            env:
              TZ: America/Los_Angeles

            envFrom:
              - secretRef:
                  name: filebrowser-secret

            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /health
                port: 80
              readiness:
                enabled: true
                type: HTTP
                path: /health
                port: 80

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: filebrowser
        type: ClusterIP
        ports:
          http:
            port: 80

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: File manager and sharing
          gethomepage.dev/group: Apps
          gethomepage.dev/icon: filebrowser
          gethomepage.dev/name: FileBrowser
          gethomepage.dev/app: filebrowser
        hostnames: ["files.tosih.org"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      config:
        type: configMap
        name: filebrowser-config
        globalMounts:
          - path: /home/filebrowser/data/config.yaml
            subPath: config.yaml
            readOnly: true
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 5Gi
        globalMounts:
          - path: /home/filebrowser/data
      files:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        storageClass: zfs-nfs
        size: 100Gi
        globalMounts:
          - path: /data
      media:
        type: persistentVolumeClaim
        existingClaim: media-nfs
        globalMounts:
          - path: /media
