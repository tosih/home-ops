---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      home-assistant:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 0 # Change when starting from scratch
            runAsGroup: 568
            runAsNonRoot: false # Change when starting from scratch
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch

        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            env:
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-oidc-secret
                    key: OIDC_CLIENT_ID
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-oidc-secret
                    key: OIDC_CLIENT_SECRET
            command:
              - sh
              - -c
              - |
                # Always ensure configuration.yaml has the latest config
                echo "Updating configuration.yaml with latest config"
                cp /tmp/http-config/configuration.yaml /config/configuration.yaml
                echo "Configuration updated"
                
                # Create secrets.yaml with OIDC credentials
                echo "Creating secrets.yaml with OIDC credentials"
                echo "oidc_client_id: $OIDC_CLIENT_ID" > /config/secrets.yaml
                echo "oidc_client_secret: $OIDC_CLIENT_SECRET" >> /config/secrets.yaml
                echo "secrets.yaml created"

        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2025.12.5
            env:
              SECRET_RECORDER_DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: database-homeassistant-user
                    key: POSTGRES_URL
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-oidc-secret
                    key: OIDC_CLIENT_ID
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-oidc-secret
                    key: OIDC_CLIENT_SECRET

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.0.50.106
        ports:
          sonos:
            enabled: true
            port: 1400
          http:
            port: 8123
            primary: true
            appProtocol: kubernetes.io/wss
          govee:
            enabled: true
            port: 4003
            protocol: UDP

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 5Gi
        advancedMounts:
          home-assistant:
            init-config:
              - path: /config
            app:
              - path: /config

      # https://community.home-assistant.io/t/wth-is-going-on-with-docker-container-installs-and-third-party-integrations-that-need-python-modules/806430/6
      hack:
        type: emptyDir
        advancedMounts:
          home-assistant:
            app:
              - path: /.dockerenv
                subPath: .dockerenv

      http-config:
        type: configMap
        name: home-assistant-config
        advancedMounts:
          home-assistant:
            init-config:
              - path: /tmp/http-config
                readOnly: true
